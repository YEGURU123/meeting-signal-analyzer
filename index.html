<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NimitAI - Meeting Signal Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .input-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .output-section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #333;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: monospace;
            resize: vertical;
            margin-bottom: 15px;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .signals-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .signal-card {
            background: #f8f9fa;
            border-left: 4px solid;
            border-radius: 10px;
            padding: 15px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .signal-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .type-buying_interest {
            background: #d4edda;
            color: #155724;
            border-left-color: #28a745;
        }

        .type-objection {
            background: #f8d7da;
            color: #721c24;
            border-left-color: #dc3545;
        }

        .type-confusion {
            background: #fff3cd;
            color: #856404;
            border-left-color: #ffc107;
        }

        .signal-quote {
            font-style: italic;
            color: #555;
            margin: 10px 0;
            padding-left: 10px;
            border-left: 3px solid #ddd;
            font-size: 14px;
        }

        .signal-tip {
            background: #e7f3ff;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #004085;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 8px;
            margin-top: 15px;
        }

        .test-transcript-btn {
            background: #6c757d;
            margin-top: 10px;
            font-size: 14px;
        }

        .test-transcript-btn:hover {
            background: #5a6268;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 NimitAI Signal Analyzer</h1>
            <p>Paste your meeting transcript and get AI-powered sales signals + coaching tips</p>
        </div>

        <div class="main-content">
            <div class="input-section">
                <div class="section-title">
                    📝 Meeting Transcript
                </div>
                <textarea id="transcript" rows="12" placeholder="Paste your meeting transcript here...&#10;&#10;Example:&#10;Rep: Pricing is $499/seat/month.&#10;Prospect: That seems steep. We pay under $200 currently.&#10;Rep: If your team closes one extra deal per quarter, it pays for itself 10x.&#10;Prospect: Send me a pricing deck and I'll get back to you."></textarea>
                <button id="analyzeBtn">🔍 Analyze Signals</button>
                <button id="testBtn" class="test-transcript-btn">📋 Load Test Transcript</button>
            </div>

            <div class="output-section">
                <div class="section-title">
                    🎯 Detected Signals
                </div>
                <div id="results">
                    <div class="empty-state">
                        ✨ Your analysis results will appear here
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000/analyse';
        
        const analyzeBtn = document.getElementById('analyzeBtn');
        const testBtn = document.getElementById('testBtn');
        const transcriptArea = document.getElementById('transcript');
        const resultsDiv = document.getElementById('results');

        const TEST_TRANSCRIPT = `Rep: Pricing is $499/seat/month.
Prospect: That seems steep. We pay under $200 currently.
Rep: If your team closes one extra deal per quarter, it pays for itself 10x.
Prospect: Send me a pricing deck and I'll get back to you.`;

        testBtn.addEventListener('click', () => {
            transcriptArea.value = TEST_TRANSCRIPT;
        });

        analyzeBtn.addEventListener('click', async () => {
            const transcript = transcriptArea.value.trim();
            
            if (!transcript) {
                showError('Please paste a transcript before analyzing');
                return;
            }

            setLoading(true);
            
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ transcript: transcript })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error);
                }

                displaySignals(data.signals || []);
            } catch (error) {
                console.error('Error:', error);
                showError(`Failed to analyze: ${error.message}. Make sure the backend server is running on port 5000.`);
            } finally {
                setLoading(false);
            }
        });

        function displaySignals(signals) {
            if (!signals || signals.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="empty-state">
                        🤔 No clear signals detected. Try a different transcript.
                    </div>
                `;
                return;
            }

            const signalsHtml = signals.map(signal => {
                const typeClass = `type-${signal.type}`;
                const typeLabel = signal.type.replace('_', ' ').toUpperCase();
                
                return `
                    <div class="signal-card" style="border-left-color: ${getBorderColor(signal.type)}">
                        <div class="signal-type ${typeClass}">
                            ${getTypeIcon(signal.type)} ${typeLabel}
                        </div>
                        <div class="signal-quote">
                            "${escapeHtml(signal.quote)}"
                        </div>
                        <div class="signal-tip">
                            💡 ${escapeHtml(signal.tip)}
                        </div>
                    </div>
                `;
            }).join('');

            resultsDiv.innerHTML = `<div class="signals-list">${signalsHtml}</div>`;
        }

        function getBorderColor(type) {
            const colors = {
                'buying_interest': '#28a745',
                'objection': '#dc3545',
                'confusion': '#ffc107'
            };
            return colors[type] || '#6c757d';
        }

        function getTypeIcon(type) {
            const icons = {
                'buying_interest': '💰',
                'objection': '⚠️',
                'confusion': '🤔'
            };
            return icons[type] || '📌';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function setLoading(isLoading) {
            if (isLoading) {
                analyzeBtn.disabled = true;
                analyzeBtn.textContent = '⏳ Analyzing...';
                resultsDiv.innerHTML = `
                    <div class="loading">
                        <div class="spinner"></div>
                        <p>AI is analyzing the transcript...</p>
                    </div>
                `;
            } else {
                analyzeBtn.disabled = false;
                analyzeBtn.textContent = '🔍 Analyze Signals';
            }
        }

        function showError(message) {
            resultsDiv.innerHTML = `
                <div class="error-message">
                    ❌ ${escapeHtml(message)}
                </div>
            `;
        }

        // Load test transcript on page load for demo
        transcriptArea.value = TEST_TRANSCRIPT;
    </script>
</body>
</html>
